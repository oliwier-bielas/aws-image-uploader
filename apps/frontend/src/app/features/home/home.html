<div class="home-shell">
  <section class="home-card">
    <header class="home-card__header">
      <p class="home-card__eyebrow">AWS Image Uploader</p>
      <h1 class="home-card__title">Hello, in image uploader app!</h1>
      <p class="home-card__subtitle">
        Upload and manage your images
      </p>
    </header>

    <footer class="home-card__actions">
      <input
        #fileInput
        type="file"
        accept="image/*"
        class="home-card__file-input"
        (change)="onFileSelected($event)"
      />

      @if (uploadFile()) {
        <span class="home-card__file-name">{{ uploadFile()!.name }}</span>
      }

      <aiu-button
        label="Choose file"
        variant="filled"
        (click)="fileInput.click()"
      ></aiu-button>
      <aiu-button
        [label]="isUploading() ? 'Uploading...' : 'Start upload'"
        variant="tonal"
        [disabled]="!uploadFile() || isUploading()"
        (click)="uploadSelectedImage(fileInput)"
      ></aiu-button>
    </footer>

    @if (uploadError()) {
      <p class="home-card__error">{{ uploadError() }}</p>
    }

    <section class="home-card__gallery">
      <h2 class="home-card__gallery-title">Recent images</h2>
      <aiu-image-grid [images]="uploadedImages()"></aiu-image-grid>
    </section>
  </section>
</div>
